<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trusts Law Quiz — Chamberlain</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e11;
    --surface: #13151a;
    --card: #1a1d24;
    --border: #2a2d36;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.15);
    --correct: #4caf7d;
    --correct-dim: rgba(76,175,125,0.12);
    --wrong: #e05757;
    --wrong-dim: rgba(224,87,87,0.12);
    --text: #e8e4dc;
    --muted: #7a7d88;
    --tag: #2f3240;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 200px;
    background: radial-gradient(ellipse, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .course-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  h1 em {
    color: var(--accent);
    font-style: italic;
  }
  .subtitle {
    margin-top: 0.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 860px;
    margin: 2rem auto;
    padding: 0 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
    justify-content: space-between;
  }
  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .tag-btn {
    background: var(--tag);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.35rem 0.75rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tag-btn:hover { color: var(--text); border-color: var(--accent); }
  .tag-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .score-board {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .score-board span { color: var(--accent); font-weight: 500; }

  /* ── PROGRESS ── */
  .progress-wrap {
    max-width: 860px;
    margin: 0 auto 2rem;
    padding: 0 1.5rem;
  }
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.4rem;
    display: flex;
    justify-content: space-between;
  }

  /* ── QUIZ CONTAINER ── */
  #quiz-container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-header {
    padding: 1.25rem 1.5rem 0;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }
  .q-num {
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding-top: 0.15rem;
    white-space: nowrap;
    min-width: 3.5rem;
  }
  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
  }
  .q-topic {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--tag);
    padding: 0.2rem 0.55rem;
    border-radius: 2px;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 0.15rem;
  }

  .q-options {
    padding: 1rem 1.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.5;
  }
  .opt-btn:hover:not([disabled]) {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .opt-key {
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--tag);
    border-radius: 2px;
    padding: 0.1rem 0.4rem;
    min-width: 1.4rem;
    text-align: center;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }
  .opt-btn.correct {
    border-color: var(--correct);
    background: var(--correct-dim);
  }
  .opt-btn.correct .opt-key { background: var(--correct); color: #fff; }
  .opt-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-dim);
  }
  .opt-btn.wrong .opt-key { background: var(--wrong); color: #fff; }
  .opt-btn[disabled] { cursor: default; }

  .q-explanation {
    margin: 0 1.5rem 1.25rem;
    padding: 0.75rem 1rem;
    border-left: 2px solid var(--accent);
    background: var(--accent-dim);
    border-radius: 0 4px 4px 0;
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.6;
    display: none;
  }
  .q-explanation.show { display: block; }
  .q-explanation strong { color: var(--accent); }

  /* ── SUMMARY ── */
  #summary {
    display: none;
    max-width: 860px;
    margin: 2rem auto;
    padding: 0 1.5rem 4rem;
  }
  #summary.show { display: block; }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3rem 2rem;
    text-align: center;
  }
  .summary-score {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    color: var(--accent);
    font-weight: 700;
    line-height: 1;
  }
  .summary-score span { font-size: 1.5rem; color: var(--muted); }
  .summary-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.5rem;
  }
  .summary-grade {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    margin: 1.5rem 0 0.5rem;
    color: var(--text);
  }
  .summary-msg {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 2rem;
  }
  .restart-btn {
    background: var(--accent);
    color: #0d0e11;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.9rem 2rem;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .restart-btn:hover { opacity: 0.85; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.8rem;
  }
</style>
</head>

<header>
  <p class="course-label">LAW — Winter 2026 · Chamberlain</p>
  <h1>The Law of <em>Trusts</em></h1>
  <p class="subtitle">50 exam-style questions · Multiple choice</p>
</header>

<div class="controls">
  <div class="filter-group" id="filter-group">
    <button class="tag-btn active" data-filter="all">All Topics</button>
    <button class="tag-btn" data-filter="express">Express Trusts</button>
    <button class="tag-btn" data-filter="certainties">Three Certainties</button>
    <button class="tag-btn" data-filter="constitution">Constitution</button>
    <button class="tag-btn" data-filter="administration">Administration</button>
    <button class="tag-btn" data-filter="remedies">Remedies</button>
    <button class="tag-btn" data-filter="resulting">Resulting Trusts</button>
    <button class="tag-btn" data-filter="constructive">Constructive Trusts</button>
    <button class="tag-btn" data-filter="charitable">Charitable Trusts</button>
    <button class="tag-btn" data-filter="purpose">Purpose Trusts</button>
    <button class="tag-btn" data-filter="cases">Case Law</button>
  </div>
  <div class="score-board">Score: <span id="score-display">0</span> / <span id="answered-display">0</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-label">
    <span id="progress-text">0 of 0 answered</span>
    <span id="progress-pct">0%</span>
  </div>
</div>

<div id="quiz-container"></div>
<div id="summary">
  <div class="summary-card">
    <div class="summary-score" id="final-score">0<span>/0</span></div>
    <div class="summary-label">Final Score</div>
    <div class="summary-grade" id="final-grade">—</div>
    <div class="summary-msg" id="final-msg"></div>
    <button class="restart-btn" onclick="restart()">Restart Quiz</button>
  </div>
</div>

<script>
const QUESTIONS = [
  // ── EXPRESS TRUSTS ──
  {
    topic: "express",
    label: "Express Trusts",
    q: "Which of the following correctly identifies the four requirements for creating a valid express trust?",
    opts: [
      "Capacity, consideration, certainty of intention, and registration",
      "Capacity, constitution, three certainties, and formal requirements",
      "Offer, acceptance, consideration, and certainty of objects",
      "Delivery, acceptance, three certainties, and registration"
    ],
    ans: 1,
    exp: "An express trust requires: (1) the settlor has legal capacity, (2) proper constitution by transfer of property to the trustee, (3) the three certainties (intention, subject matter, objects), and (4) any requisite formalities."
  },
  {
    topic: "express",
    label: "Express Trusts",
    q: "In a discretionary trust, what discretion does the trustee have?",
    opts: [
      "Whether to administer the trust at all",
      "Whether to accept appointment as trustee",
      "Who receives the trust property and/or in what shares",
      "Whether the trust instrument should be in writing"
    ],
    ans: 2,
    exp: "In a discretionary trust, the settlor allows the trustee to decide who will receive the trust property and/or in what shares or proportions. The trustee has no discretion in a fixed trust."
  },
  {
    topic: "express",
    label: "Express Trusts",
    q: "What is the key feature of a 'bare trust'?",
    opts: [
      "The trustee holds both legal and equitable title",
      "The settlor holds beneficial title and gives away legal title",
      "The trust has no written instrument",
      "The beneficiary is unknown at the time of creation"
    ],
    ans: 1,
    exp: "In a bare trust, the settlor holds beneficial title and gives away legal title. The idea is to receive the benefits of the property without having to manage it themselves."
  },
  {
    topic: "express",
    label: "Express Trusts",
    q: "Which of the following is NOT a right held by a beneficiary 'in personam' against the trustee?",
    opts: [
      "Right to compel proper administration",
      "Right to information about administration",
      "Right to collapse the trust under Saunders v Vautier",
      "Right to compensation for losses from breach of trust"
    ],
    ans: 2,
    exp: "The right to collapse the trust under Saunders v Vautier is a right in rem (against the trust property itself). Rights in personam against the trustee include compelling proper administration, enjoining improper distribution, obtaining information, and compensation for breach."
  },
  {
    topic: "express",
    label: "Express Trusts",
    q: "Who is 'Equity's darling' and what is their significance?",
    opts: [
      "The settlor; they can always revoke the trust",
      "The trustee; they are immune from breach claims",
      "A bona fide purchaser for value without notice; they take free of the trust",
      "The court; it has ultimate control over trust administration"
    ],
    ans: 2,
    exp: "Equity's darling is the bona fide purchaser for value without notice. If a trustee sells property to such a buyer, the buyer keeps the property free of the trust. The beneficiaries are not without remedy — they can still sue the trustee for breach — but their interest in the property is lost."
  },

  // ── THREE CERTAINTIES ──
  {
    topic: "certainties",
    label: "Three Certainties",
    q: "What is a 'precatory trust' and what is its legal effect?",
    opts: [
      "A trust created in secret; it is enforceable as a constructive trust",
      "A trust using non-mandatory language ('wish', 'desire'); it is not a valid trust",
      "A trust with no beneficiaries; it fails for certainty of objects",
      "A trust created orally; it is unenforceable for land"
    ],
    ans: 1,
    exp: "A precatory trust uses non-mandatory language such as 'fervent wish,' 'desire,' 'hope,' or 'recommendation.' This creates a mere moral obligation, not a legal one. The gift goes to the first recipient with no binding obligation to use it as directed."
  },
  {
    topic: "certainties",
    label: "Three Certainties",
    q: "In Re Adams and the Kensington Vestry, the testator left property to his wife 'in full confidence' she would use it for the children. What did the court hold?",
    opts: [
      "A valid discretionary trust was created",
      "An absolute gift was made with merely moral obligations",
      "A resulting trust arose because intention was uncertain",
      "The children had enforceable rights in personam"
    ],
    ans: 1,
    exp: "The court held it was an absolute gift to the wife with only moral obligations — not a legally binding trust. The onus is on the beneficiaries to prove intention, and 'in full confidence' was insufficient to create a mandatory obligation."
  },
  {
    topic: "certainties",
    label: "Three Certainties",
    q: "Palmer v Simmonds established that what type of language makes the subject matter of a trust uncertain?",
    opts: [
      "Language referring to a specific percentage of an estate",
      "Language referring to 'the bulk' of a fund",
      "Language referring to 'the residue' of an estate",
      "Language describing property by address"
    ],
    ans: 1,
    exp: "In Palmer v Simmonds, the term 'the bulk' was deemed too vague and subjective to identify a clear and definite portion of the estate. Vague or subjective language that makes trust property unascertainable will void the trust."
  },
  {
    topic: "certainties",
    label: "Three Certainties",
    q: "What test applies to determine certainty of objects for a FIXED trust?",
    opts: [
      "Individual ascertainability — can you say if any given person is or is not in the class",
      "Class ascertainability — must be possible to make a complete list of every beneficiary",
      "Administrative workability — the class cannot be so large the trust cannot function",
      "Conceptual certainty — can you understand the words chosen by the settlor"
    ],
    ans: 1,
    exp: "Fixed trusts require the 'complete list' or 'class ascertainability' test established in IRC v Broadway Cottages: it must be possible to identify every single member of the class. The trustee knows exactly who the beneficiaries are and what they receive."
  },
  {
    topic: "certainties",
    label: "Three Certainties",
    q: "The test from McPhail v Doulton for certainty of objects in discretionary trusts asks:",
    opts: [
      "Can you make a complete and closed list of all beneficiaries?",
      "Is it possible to say of any given person whether they are or are not a member of the class?",
      "Would an ordinary person understand the purpose of the trust?",
      "Is the class numerically small enough to be administratively manageable?"
    ],
    ans: 1,
    exp: "McPhail v Doulton replaced the complete list test for discretionary trusts with the individual ascertainability test: 'Is it possible to say that any given person is or is not a member of a class?' Conceptual certainty is required; evidentiary certainty comes later. Administrative unworkability can still invalidate the trust."
  },
  {
    topic: "certainties",
    label: "Three Certainties",
    q: "Hunter v Moss held that shares in a company could be the certain subject matter of a trust without segregation. What was the key reason?",
    opts: [
      "The beneficiary had already taken possession",
      "All shares were identical and equal in value, so segregation was unnecessary",
      "The trust was created before any third-party claim arose",
      "The settlor had declared the trust in writing"
    ],
    ans: 1,
    exp: "In Hunter v Moss, the 50 shares were all identical and equal in value, so there was no need to segregate them. This distinguishes it from Re London Wine Co (Shippers) where the goods were physically different and identification of specific units was required."
  },

  // ── CONSTITUTION ──
  {
    topic: "constitution",
    label: "Constitution",
    q: "The rule in Milroy v Lord provides that:",
    opts: [
      "A court will perfect an imperfect gift if the settlor clearly intended it",
      "For a trust to be made, the settlor must have done everything necessary to transfer legal title; equity will not perfect an imperfect gift",
      "An intention to transfer operates automatically as a declaration of trust",
      "A constructive trust will always save a failed express trust"
    ],
    ans: 1,
    exp: "Milroy v Lord establishes that for a trust to be valid, the settlor must have done everything that, according to the nature of the property, was necessary for them to do to transfer legal title. Equity will not step in to save an imperfect gift, and an intention to transfer does not operate as a declaration of trust."
  },
  {
    topic: "constitution",
    label: "Constitution",
    q: "The 'Every Effort Rule' from Re Rose applies where:",
    opts: [
      "The settlor has done everything within their power to transfer title, but the transfer is delayed by a third party's act",
      "The trustee has accepted appointment and begun administering the trust",
      "The beneficiary has relied to their detriment on the settler's promise",
      "The court orders specific performance of the transfer agreement"
    ],
    ans: 0,
    exp: "Re Rose holds that if a donor has done everything they could possibly do to transfer legal title (i.e., everything required of them), but the transfer is delayed by a step that requires a third party's act (e.g., company registration), the transfer is effective in equity from the moment the donor completed their part. A constructive trust bridges the gap."
  },
  {
    topic: "constitution",
    label: "Constitution",
    q: "In Carson v Wilson, the court held that signing a deed designed to take effect on death showed:",
    opts: [
      "An intention to create an inter vivos trust",
      "An intention to make a gift, not create a trust",
      "A valid secret testamentary trust",
      "A declaration of trust over the property"
    ],
    ans: 1,
    exp: "In Carson v Wilson, signing a deed to come into effect upon death showed an intention to make a gift, not to create a trust. A failed gift is not converted into a trust by the court."
  },
  {
    topic: "constitution",
    label: "Constitution",
    q: "Paul v Constance established that for a valid self-declaration of trust:",
    opts: [
      "The words 'I hold this on trust' must be explicitly used",
      "A written instrument signed by the settlor is mandatory",
      "Clear evidence of intention is sufficient; sophisticated legal terminology is not required",
      "The beneficiary must provide consideration"
    ],
    ans: 2,
    exp: "In Paul v Constance, Mr. Constance repeatedly said the money was 'as much yours as mine.' The court held that for a self-declaration of trust, clear evidence of intention is sufficient — sophisticated legal terminology is not required when the intention is nonetheless clear."
  },
  {
    topic: "constitution",
    label: "Constitution",
    q: "What is the doctrine in Strong v Bird?",
    opts: [
      "A trustee who becomes a beneficiary can collapse the trust",
      "If a person intended to gift property but did not perfect it, and that person later becomes executor, the gift is perfected by vesting on death",
      "An incomplete gift can be perfected by proprietary estoppel",
      "A trust can be declared orally over real property"
    ],
    ans: 1,
    exp: "Strong v Bird holds that if the intended recipient of an imperfect gift later becomes the executor under the donor's will, the gift is deemed complete. Property vests in the executor under the will for distribution, so the gift is perfected even if it was not completed during the donor's lifetime."
  },

  // ── ADMINISTRATION ──
  {
    topic: "administration",
    label: "Administration",
    q: "Under the Saunders v Vautier rule, when can beneficiaries collapse a trust?",
    opts: [
      "At any time, provided at least one beneficiary requests it",
      "Only with court approval and good reason",
      "Where all beneficiaries have full legal capacity and collectively hold the entire beneficial interest",
      "Only after the trust has been administered for 21 years"
    ],
    ans: 2,
    exp: "Under Saunders v Vautier, where the beneficiary (or all beneficiaries together) has an absolute indefeasible interest, is of full legal capacity, and collectively holds the entire beneficial interest, they can demand termination of the trust and delivery of the property."
  },
  {
    topic: "administration",
    label: "Administration",
    q: "What is the standard of care for a trustee when making investments?",
    opts: [
      "The care of a person of ordinary prudence managing their own affairs",
      "The care of a person of ordinary prudence managing the affairs of another person",
      "The highest possible standard — strict liability for any loss",
      "The standard of a reasonable person with no financial expertise"
    ],
    ans: 1,
    exp: "Learoyd v Whiteley established that the investment standard is that of 'a person of ordinary prudence managing the affairs of another person' — higher than managing your own affairs — because the trustee is investing for someone else's benefit and must not be unduly speculative."
  },
  {
    topic: "administration",
    label: "Administration",
    q: "In Fales v Canada Permanent Trust (SCC), what was the court's holding regarding the standard of care for professional vs. non-professional trustees?",
    opts: [
      "Professional trustees are held to a higher standard than lay trustees",
      "There is an equal standard of care; however, the court may relieve a lay trustee under the statutory defence if they acted honestly and reasonably",
      "Non-professional trustees are held to a lower standard and have no liability",
      "Only professional trustees can be found liable for breach of trust"
    ],
    ans: 1,
    exp: "In Fales, the SCC held there is an equal objective standard of care. However, the court relieved the lay trustee (the widow) from liability under the statutory defence because she had limited financial experience, acted honestly, and the corporate trustee had failed to properly inform her."
  },
  {
    topic: "administration",
    label: "Administration",
    q: "What is the legal effect of Re Brockbank regarding beneficiaries' ability to direct trustee appointments?",
    opts: [
      "Beneficiaries can direct the trustee to appoint a specific replacement trustee",
      "The court will always defer to beneficiary preferences in trustee appointments",
      "The remaining trustee must exercise independent judgment; beneficiaries cannot compel a specific appointment",
      "Beneficiaries holding full beneficial interest can appoint any trustee they choose"
    ],
    ans: 2,
    exp: "In Re Brockbank, the court held that appointment of a substitute trustee is the job of the remaining trustee, who must exercise independent fiduciary judgment. Beneficiaries cannot compel a trustee to exercise their discretionary power of appointment in a particular way. If they want more control, they must collapse the trust under Saunders v Vautier."
  },
  {
    topic: "administration",
    label: "Administration",
    q: "Under what circumstances can a trustee be removed by the court?",
    opts: [
      "Whenever a majority of beneficiaries requests removal",
      "Only where the trustee has been convicted of a criminal offence",
      "Where the trustee's continuance jeopardizes assets, risks beneficiary welfare, or prevents proper execution of the trust",
      "Whenever there is friction between trustees and beneficiaries"
    ],
    ans: 2,
    exp: "Removal is justified (and may be ordered under s. 5 of the Trustee Act) where the trustee's continuance jeopardizes trust assets, puts beneficiary welfare at risk, or prevents the trust from being properly executed. Mere friction or disagreement (Conroy v Stokes) is not sufficient."
  },

// ── STATE ──
let answered = {}; // { idx: true/false }
let currentFilter = "all";
let filteredIndices = [];

// ── FILTER ──
function getFiltered() {
  if (currentFilter === "all") return QUESTIONS.map((_,i)=>i);
  return QUESTIONS.map((_,i)=>i).filter(i => QUESTIONS[i].topic === currentFilter);
}

function updateFilter(filter) {
  currentFilter = filter;
  filteredIndices = getFiltered();
  document.querySelectorAll('.tag-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  renderQuiz();
}

// ── RENDER ──
function renderQuiz() {
  filteredIndices = getFiltered();
  const container = document.getElementById('quiz-container');
  const summary = document.getElementById('summary');

  // Count answered in filtered set
  const answeredInFilter = filteredIndices.filter(i => i in answered);
  const correctInFilter = filteredIndices.filter(i => answered[i] === true);

  // Progress
  const pct = filteredIndices.length ? Math.round(answeredInFilter.length / filteredIndices.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${answeredInFilter.length} of ${filteredIndices.length} answered`;
  document.getElementById('progress-pct').textContent = pct + '%';

  // Score
  document.getElementById('score-display').textContent = correctInFilter.length;
  document.getElementById('answered-display').textContent = answeredInFilter.length;

  // Show summary if all answered
  const allDone = filteredIndices.length > 0 && answeredInFilter.length === filteredIndices.length;
  summary.classList.toggle('show', allDone);
  container.style.display = allDone ? 'none' : 'flex';

  if (allDone) {
    renderSummary(correctInFilter.length, filteredIndices.length);
    return;
  }

  container.innerHTML = '';
  filteredIndices.forEach((qIdx, rank) => {
    const q = QUESTIONS[qIdx];
    const isAnswered = qIdx in answered;
    const card = document.createElement('div');
    card.className = 'q-card';
    card.style.animationDelay = (rank * 0.04) + 's';

    const optHtml = q.opts.map((o, i) => {
      let cls = 'opt-btn';
      if (isAnswered) {
        cls += ' ' + (i === q.ans ? 'correct' : (answered[qIdx] === false && /* selected */ false ? 'wrong' : ''));
      }
      return `<button class="${cls}" ${isAnswered ? 'disabled' : ''} onclick="answer(${qIdx}, ${i}, event)">
        <span class="opt-key">${String.fromCharCode(65+i)}</span>
        <span>${o}</span>
      </button>`;
    });

    // We store selected index in data attribute; need to track selected for coloring
    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${rank+1}</span>
        <p class="q-text">${q.q}</p>
        <span class="q-topic">${q.label}</span>
      </div>
      <div class="q-options" id="opts-${qIdx}">${optHtml.join('')}</div>
      <div class="q-explanation ${isAnswered ? 'show' : ''}" id="exp-${qIdx}">
        ${isAnswered ? `<strong>${answered[qIdx] ? '✓ Correct.' : '✗ Incorrect.'}</strong> ${q.exp}` : q.exp}
      </div>`;
    container.appendChild(card);

    // Re-color selected wrong option if answered
    if (isAnswered) {
      const sel = card.getAttribute('data-selected');
      // handled below via stored selected index
    }
  });

  // Restore wrong coloring from stored selections
  filteredIndices.forEach(qIdx => {
    if (qIdx in answered) {
      const stored = selectedMap[qIdx];
      if (stored !== undefined && stored !== QUESTIONS[qIdx].ans) {
        const optsEl = document.getElementById('opts-' + qIdx);
        if (optsEl) {
          optsEl.children[stored]?.classList.add('wrong');
        }
      }
    }
  });
}

const selectedMap = {}; // { qIdx: selectedOptionIndex }

function answer(qIdx, selectedIdx, e) {
  if (qIdx in answered) return;
  const q = QUESTIONS[qIdx];
  const isCorrect = selectedIdx === q.ans;
  answered[qIdx] = isCorrect;
  selectedMap[qIdx] = selectedIdx;

  // Color options
  const optsEl = document.getElementById('opts-' + qIdx);
  Array.from(optsEl.children).forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === selectedIdx) btn.classList.add('wrong');
  });

  // Show explanation
  const expEl = document.getElementById('exp-' + qIdx);
  expEl.innerHTML = `<strong>${isCorrect ? '✓ Correct.' : '✗ Incorrect.'}</strong> ${q.exp}`;
  expEl.classList.add('show');

  // Update score
  const filteredAnswered = filteredIndices.filter(i => i in answered);
  const filteredCorrect = filteredIndices.filter(i => answered[i] === true);
  document.getElementById('score-display').textContent = filteredCorrect.length;
  document.getElementById('answered-display').textContent = filteredAnswered.length;

  const pct = Math.round(filteredAnswered.length / filteredIndices.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${filteredAnswered.length} of ${filteredIndices.length} answered`;
  document.getElementById('progress-pct').textContent = pct + '%';

  // Check if all done
  if (filteredAnswered.length === filteredIndices.length) {
    setTimeout(() => {
      document.getElementById('quiz-container').style.display = 'none';
      document.getElementById('summary').classList.add('show');
      renderSummary(filteredCorrect.length, filteredIndices.length);
    }, 800);
  }
}

function renderSummary(correct, total) {
  const pct = Math.round(correct / total * 100);
  document.getElementById('final-score').innerHTML = `${correct}<span>/${total}</span>`;
  let grade, msg;
  if (pct >= 90) { grade = 'Distinction'; msg = 'Exceptional command of trusts law. Exam ready.'; }
  else if (pct >= 80) { grade = 'Merit'; msg = 'Strong understanding. Review weaker topics and you are well prepared.'; }
  else if (pct >= 70) { grade = 'Pass'; msg = 'Solid foundation. Focus on the areas where you stumbled.'; }
  else if (pct >= 55) { grade = 'Borderline'; msg = 'Revisit the material — particularly case law and tracing rules.'; }
  else { grade = 'Needs Work'; msg = 'Return to the notes and try each topic section separately.'; }
  document.getElementById('final-grade').textContent = `${grade} — ${pct}%`;
  document.getElementById('final-msg').textContent = msg;
}

function restart() {
  Object.keys(answered).forEach(k => delete answered[k]);
  Object.keys(selectedMap).forEach(k => delete selectedMap[k]);
  document.getElementById('summary').classList.remove('show');
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── INIT ──
document.getElementById('filter-group').addEventListener('click', e => {
  const btn = e.target.closest('.tag-btn');
  if (btn) updateFilter(btn.dataset.filter);
});

filteredIndices = getFiltered();
renderQuiz();
</script>
